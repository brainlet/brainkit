syntax = "proto3";
package brainkit.plugin.v1;

option go_package = "github.com/brainlet/brainkit/proto/plugin/v1;pluginv1";

// BrainkitPluginService is implemented by the PLUGIN process.
service BrainkitPluginService {
    rpc Handshake(HandshakeRequest) returns (HandshakeResponse);
    rpc Manifest(ManifestRequest) returns (PluginManifest);
    rpc MessageStream(stream PluginMessage) returns (stream PluginMessage);
    rpc Health(HealthRequest) returns (HealthResponse);
}

// BrainkitHostService is implemented by the KIT process.
service BrainkitHostService {
    rpc Handshake(HandshakeRequest) returns (HandshakeResponse);
    rpc MessageStream(stream PluginMessage) returns (stream PluginMessage);
}

message HandshakeRequest {
    string name = 1;
    string version = 2;
    string type = 3;
}

message HandshakeResponse {
    string name = 1;
    string version = 2;
    bool accepted = 3;
    string rejection_reason = 4;
}

message ManifestRequest {}

message PluginManifest {
    string owner = 1;
    string name = 2;
    string version = 3;
    string description = 4;

    repeated ToolDefinition tools = 5;
    repeated InterceptorDefinition interceptors = 6;
    repeated EventDefinition events = 7;
    repeated SubscriptionDefinition subscriptions = 8;
    repeated AgentDefinition agents = 9;
    repeated FileDefinition files = 10;
}

message ToolDefinition {
    string name = 1;
    string description = 2;
    string input_schema = 3;
    string output_schema = 4;
    reserved 5;
}

message InterceptorDefinition {
    string name = 1;
    int32 priority = 2;
    string topic_filter = 3;
}

message EventDefinition {
    string name = 1;
    string schema = 2;
}

message SubscriptionDefinition {
    string topic = 1;
}

message AgentDefinition {
    string name = 1;
    string description = 2;
    string model = 3;
    repeated string tools = 4;
    string instructions = 5;
}

message FileDefinition {
    string path = 1;
    string type = 2;
    string content = 3;
}

message PluginMessage {
    string id = 1;
    string type = 2;
    string version = 3;
    string trace_id = 4;
    string parent_id = 5;
    string reply_to = 6;
    string topic = 7;
    string address = 8;
    string caller_id = 9;
    int32 depth = 10;
    bytes payload = 11;
    map<string, string> metadata = 12;
}

message HealthRequest {}

message HealthResponse {
    bool healthy = 1;
    string message = 2;
}
