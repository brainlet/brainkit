commands:
  # Mission scope is type-alignment on agent.d.ts + ai.d.ts + fixtures/ts/**. Validators MUST
  # gate on the mission-relevant tests, not the full brainkit Go suite (which has pre-existing
  # failures in bus/cli/cross/deploy/gateway/plugins/stress that predate this mission and are
  # out of scope — see AGENTS.md "Known pre-existing failures").
  install: cd internal/embed/agent/bundle && pnpm install --prefer-offline
  typecheck: node_modules/.bin/tsc --noEmit -p fixtures/tsconfig.base.json
  build: make brainkit
  # `test` is the gate validators use. Points at the fixture runtime gate — the source of truth
  # for whether types declared in agent.d.ts / ai.d.ts line up with what QuickJS actually runs.
  test: go test ./test/fixtures/ -run TestFixtures -count=1 -timeout 1200s
  # `test-suite` is the broader Go suite test. Run manually, NOT invoked by default validators.
  # Has pre-existing failures (see AGENTS.md). Workers should not treat its failure as mission-caused.
  test-suite: go test ./test/suite/... -timeout 600s
  lint: go vet ./...

services:
  # Podman is a user-managed VM; the Go fixture runner lazy-starts pgvector, mongodb, and libsql
  # containers itself via testcontainers-go. Workers do not start or stop these; they are
  # implicit dependencies of `go test ./test/fixtures/`.
  #
  # Declared here only for observability and health verification.
  podman-machine:
    start: podman machine start podman-machine-default
    stop: podman machine stop podman-machine-default
    healthcheck: podman machine list --format '{{.Name}} {{.Running}}' | grep -q 'podman-machine-default.*true'
    port: 0
    depends_on: []
