version: "2"
sql:
  # SQLite: sqlc's SQLite engine has a truncation bug with tables having 10+ columns.
  # SQLite adapter uses database/sql directly with embedded schema for migrations.
  # Only Postgres uses sqlc codegen.

  - schema: "sql/postgres/schema.sql"
    queries: "sql/postgres/queries.sql"
    engine: "postgresql"
    gen:
      go:
        package: "pggen"
        out: "sqlgen/postgres"
        emit_empty_slices: true
        sql_package: "database/sql"
